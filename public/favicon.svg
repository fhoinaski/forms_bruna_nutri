<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Fundo circular creme -->
  <circle cx="32" cy="32" r="32" fill="#FAF7F2"/>

  <!-- Arco externo (abraço/circulo da mãe) -->
  <path d="M14 38 Q10 20 28 13 Q44 8 50 24 Q54 36 46 46"
        stroke="#B47F6A" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- Corpo/cabelo da mãe simplificado -->
  <ellipse cx="30" cy="19" rx="5" ry="6" fill="none" stroke="#B47F6A" stroke-width="2" stroke-linecap="round"/>
  <!-- Cabelo longo -->
  <path d="M25 22 Q20 30 22 40 Q24 46 28 48"
        stroke="#B47F6A" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Bebê (forma pequena arredondada) -->
  <ellipse cx="36" cy="38" rx="7" ry="8.5" fill="none" stroke="#B47F6A" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Cabeça do bebê -->
  <circle cx="36" cy="29" r="4.5" fill="none" stroke="#B47F6A" stroke-width="1.8"/>
  <!-- Bracinhos -->
  <path d="M30 37 Q27 39 29 42" stroke="#B47F6A" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Folhas (verde sálvia) -->
  <path d="M18 14 Q14 8 20 6 Q22 12 18 14Z" fill="#7A9A74"/>
  <path d="M22 11 Q19 5 25 4 Q26 10 22 11Z" fill="#7A9A74" opacity="0.8"/>
  <path d="M15 17 Q10 13 13 8 Q17 13 15 17Z" fill="#7A9A74" opacity="0.6"/>

  <!-- Coraçãozinho rosa -->
  <path d="M44 42 C44 40.5 42 39 41 40.5 C40 39 38 40.5 38 42 C38 44 41 46 41 46 C41 46 44 44 44 42Z"
        fill="#F4C9C6"/>

  <!-- Pontinhos decorativos -->
  <circle cx="27" cy="10" r="1.2" fill="#F4C9C6"/>
  <circle cx="49" cy="30" r="1" fill="#EAD8C2"/>
</svg>
